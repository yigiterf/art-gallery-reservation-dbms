version: '3.8'

services:
  db:
    image: postgres:15
    container_name: art_gallery_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: art_gallery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    container_name: art_gallery_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=art_gallery
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    command: npm start

  frontend:
    build:
      context: ./frontend
    container_name: art_gallery_frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
